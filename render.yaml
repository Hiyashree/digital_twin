# Render cloud — lite classifier fits in 512MB (no PyTorch). Full ViT runs locally only.
services:
  - type: web
    name: digital-twin-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 1 ml_server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: WASTE_CLOUD_LITE
        value: "true"
      - key: YOLO_ENABLED
        value: "false"
